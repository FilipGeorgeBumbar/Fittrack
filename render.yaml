# Render Blueprint — FitTrack Deployment
# https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: fittrack-api
    runtime: node
    region: frankfurt
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_HTTP
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "30m"
      - key: DATABASE_URL
        fromDatabase:
          name: fittrack-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://fittrack-app.onrender.com

databases:
  - name: fittrack-db
    plan: free
    region: frankfurt
    databaseName: fittrack
